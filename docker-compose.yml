version: "3.9"

services:
  db:
    image: postgres:15
    container_name: hotel_db
    restart: always
    environment:
      PG_DATABASE: hotel_db
      PG_USER: hotel_user
      PG_PASSWORD: hotel_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: hotel_backend
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8069
      "
    volumes:
      - .:/app
    ports:
      - "8069:8069"
    depends_on:
      - db

volumes:
  postgres_data: